@if (!toast.delayAppearance) {
  <div
    class="relative mb-3 flex items-start gap-3 overflow-hidden rounded-2xl border border-white/8 p-4 text-start backdrop-blur-xl"
    [style.background]="toastBackground()"
  >
    <!-- Glowing icon badge -->
    <div
      class="mt-0.5 shrink-0 rounded-xl p-2"
      [style.background]="iconBadgeBackground()"
      [style.box-shadow]="iconBadgeShadow()"
      [style.color]="accentColor()"
    >
      <app-toast-icon [type]="toast.type" />
    </div>

    <!-- Content -->
    <div class="min-w-0 flex-1">
      @if (toast.title) {
        <h5 class="text-sm font-semibold capitalize text-white">{{ toast.title }}</h5>
      }
      <p class="text-sm capitalize text-gray-300">{{ toast.message }}</p>
    </div>

    <!-- Close button -->
    <button
      type="button"
      aria-label="Close"
      class="shrink-0 cursor-pointer rounded-lg p-1 text-gray-500 transition-all hover:bg-white/10 hover:text-white"
      (click)="closeToast()"
    >
      <app-close-icon />
    </button>

    <!-- Progress bar -->
    <span
      class="absolute bottom-0 left-0 h-0.5 rounded-full"
      [style.width.%]="progress()"
      [style.background]="accentColor()"
      [style.box-shadow]="progressBarShadow()"
      [style.transition]="'width ' + intervalTime + 'ms linear'"
    ></span>
  </div>
}
